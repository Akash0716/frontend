<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOB FORM</title>
</head>
<body>
    <header>
        <h1 align="center">JOB APPLICATION (Cognizant)</h1>
    </header>

    <main>
        <table align="center" border="10" cellspacing="0" cellpadding="0">
            <tr>
                <td>Name</td>
                <td><input type="text" placeholder="Enter Your Full Name"></td>
            </tr>

            <tr>
                <td>Age</td>
                <td><input type="text" placeholder="Enter Your Age"></td>
            </tr>

            <tr>
                <td>Gender</td>
                <td>
                    <label><input type="radio" name="gender" value="Male"> MALE</label>
                    <label><input type="radio" name="gender" value="Female"> FEMALE</label>
                </td>
            </tr>

            <tr>
                <td>Domain</td>
                <td>
                    <select>
                        <option>Full Stack Developer</option>
                        <option>Machine Learning</option>
                        <option>Data Analyst</option>
                        <option>DevOps Engineer</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td>Email</td>
                <td><input type="email" placeholder="Enter Your Email"></td>
            </tr>

            <tr>
                <td>Resume</td>
                <td><input type="file"></td>
            </tr>
        </table>

        <br><br>

        <form align="center">
            <input type="submit" value="Apply Now">
        </form>
    </main>
</body>
</html>
