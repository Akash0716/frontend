<!DOCTYPE html>
<html>
<head>
    <title>Student Registration Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Student Registration Form</h2>

    <form>
        <table>

            <tr>
                <td>Name</td>
                <td><input type="text" placeholder="Enter Your Full Name"></td>
            </tr>

            <tr>
                <td>Age</td>
                <td><input type="text" placeholder="Enter Your Age"></td>
            </tr>

            <tr>
                <td>Email</td>
                <td><input type="email" placeholder="Enter Your Email"></td>
            </tr>

            <tr>
                <td>Phone Number</td>
                <td><input type="tel" placeholder="Enter Your Mobile Number"></td>
            </tr>

            <tr>
                <td>Gender</td>
                <td>
                    <input type="radio" name="gender"> Male
                    <input type="radio" name="gender"> Female
                </td>
            </tr>

            <tr>
                <td>Date of Birth</td>
                <td><input type="date"></td>
            </tr>

            <tr>
                <td>Department</td>
                <td>
                    <select>
                        <option>Select Department</option>
                        <option>CSE</option>
                        <option>ECE</option>
                        <option>EEE</option>
                        <option>Mechanical</option>
                        <option>Civil</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td>Upload Photo</td>
                <td><input type="file"></td>
            </tr>

            <tr>
                <td>Address</td>
                <td>
                    <textarea placeholder="Enter Your Address"></textarea>
                </td>
            </tr>

            <tr>
                <td>Agreement</td>
                <td>
                    <input type="checkbox">
                    I confirm that the above information is correct.
                </td>
            </tr>

            <tr>
                <td colspan="2" align="center">
                    <button type="submit">Submit Registration</button>
                </td>
            </tr>

        </table>
    </form>

</div>

</body>
</html>
