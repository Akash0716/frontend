<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akash Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar -->
    <header>
        <nav class="navbar">
            <div class="logo">Akash Store</div>
            <ul class="nav-links">
                <li><a href="#">Home</a></li>
                <li><a href="#">Products</a></li>
                <li><a href="#">Offers</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <h1>Welcome to Akash Store</h1>
        <p>Quality Products at Affordable Prices</p>
        <button>Explore Now</button>
    </section>

    <!-- Product Section -->
    <section class="products">
        <h2>Popular Products</h2>

        <div class="product-grid">

            <div class="product-card">
                <img src="https://via.placeholder.com/200" alt="Product">
                <h3>Sports Shoes</h3>
                <p>$29.99</p>
                <button>Add to Cart</button>
            </div>

            <div class="product-card">
                <img src="https://via.placeholder.com/200" alt="Product">
                <h3>Backpack</h3>
                <p>$39.99</p>
                <button>Add to Cart</button>
            </div>

            <div class="product-card">
                <img src="https://via.placeholder.com/200" alt="Product">
                <h3>Smart Watch</h3>
                <p>$49.99</p>
                <button>Add to Cart</button>
            </div>

            <div class="product-card">
                <img src="https://via.placeholder.com/200" alt="Product">
                <h3>Headphones</h3>
                <p>$59.99</p>
                <button>Add to Cart</button>
            </div>

        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 Akash Store. All Rights Reserved.</p>
    </footer>

</body>
</html>
